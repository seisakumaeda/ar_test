<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR.js 確実起動テスト</title>
    
    <!-- 安定動作する組み合わせのライブラリ（CDN） -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <!-- ローディング画面などの余計なプログラムを一切挟まず、ダイレクトにカメラを起動します -->
    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Hiroマーカーを検知したときに青い立方体を表示 -->
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" material="color: #007bff;"></a-box>
      </a-marker>
      
      <!-- AR用のカメラ -->
      
    </a-scene>
  </body>
</html>
