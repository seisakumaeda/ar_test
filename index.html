<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <!-- スマホ画面にぴったり合わせるための必須設定 -->
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR.js Test</title>
    
    <!-- 安定動作する組み合わせのライブラリ（CDN）を読み込みます -->
    <script src="https://aframe.io"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <!-- vr-mode-uiを不活性にし、公式の安定した追従エンジンを指定 -->
    <a-scene embedded vr-mode-ui="enabled: false;" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Hiroマーカーを検知したときに青い立方体を表示 -->
      <a-marker preset="hiro">
        <!-- 確実に視認できるよう少し大きめ(0.6)に設定 -->
        <a-box position="0 0.3 0" scale="0.6 0.6 0.6" material="color: #007bff; roughness: 0.3;"></a-box>
      </a-marker>
      
      <!-- AR用のカメラエンティティ -->
      
    </a-scene>
  </body>
</html>
